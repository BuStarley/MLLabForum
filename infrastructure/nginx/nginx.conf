events {
    worker_connections 1024;
}

http {
    limit_req_zone $binary_remote_addr zone=mylimit:10m rate=10r/s;

    server {
        listen 80;
        server_name mllabforum.local;

        location / {
            limit_req zone=mylimit burst=20 nodelay;

            # Временно возвращаем заглушку (пока нет api-gateway)
            return 200 "MLLabForum Infrastructure is running!\n";
            add_header Content-Type text/plain;
        }
    }

