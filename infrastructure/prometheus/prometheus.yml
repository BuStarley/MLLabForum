global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'eureka'
    eureka_sd_configs:
      - server: http://eureka:8761/eureka
    relabel_configs:
      - source_labels: [__meta_eureka_app_name]
        target_label: service

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'kafka'
    static_configs:
      - targets: ['kafka:9092']