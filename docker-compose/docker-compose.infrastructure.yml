services:
  nginx:
    image: nginx:alpine
    container_name: mllab-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ../infrastructure/nginx/ssl:/etc/nginx/ssl:ro
    networks:
      - mllab-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost"]
      interval: 30s
      timeout: 10s
      retries: 5

  mailhog:
    image: mailhog/mailhog:latest
    container_name: mllab-mailhog
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - mllab-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8025"]
      interval: 30s
      timeout: 10s
      retries: 5

  eureka-server:
    image: bustarley/eureka-server:latest
    container_name: mllab-eureka-server
    ports:
      - "8761:8761"
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SERVER_PORT: 8761
    networks:
      - mllab-network
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8761/actuator/health" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  config-server:
    image: bustarley/config-server:latest
    container_name: mllab-config-server
    ports:
      - "8888:8888"
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SERVER_PORT: 8888
      CONFIG_GIT_URI: https://github.com/BuStarley/mllab-config
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
    depends_on:
      eureka-server:
        condition: service_healthy
    networks:
      - mllab-network
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8888/actuator/health" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s