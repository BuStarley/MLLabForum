services:
  auth-db:
    image: postgres:16-alpine
    container_name: mllab-auth-db
    environment:
      POSTGRES_DB: mllab_auth
      POSTGRES_USER: mllab_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    ports:
      - "5433:5432"
    volumes:
      - postgres-auth-data:/var/lib/postgresql/data
    networks:
      - mllab-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mllab_user -d mllab_auth"]
      interval: 10s
      timeout: 5s
      retries: 5

