services:
  auth-redis:
    image: redis:7-alpine
    container_name: mllab-auth-redis
    ports:
      - "6379:6379"
    volumes:
      - ../infrastructure/redis/auth-redis.conf:/usr/local/etc/redis/redis.conf
      - redis-auth-data:/data
    command: redis-server /usr/local/etc/redis/redis.conf
    networks:
      - mllab-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  profile-redis:
    image: redis:7-alpine
    container_name: mllab-profile-redis
